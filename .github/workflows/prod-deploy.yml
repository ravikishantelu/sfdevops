name: Deploy to Production

# -------------------------------------------------------
# Fires when code is merged into 'main' (PR from uat
# with 2 required approvals + UAT sign-off).
#
# Two-job pipeline:
#   Job 1 – validate-prod  : dry-run validate (auto)
#   Job 2 – deploy-prod    : real deploy behind the
#                            'production' environment
#                            gate (2 required reviewers)
# -------------------------------------------------------
on:
  push:
    branches:
      - main

jobs:
  # ── JOB 1: Dry-run validation ────────────────────────
  validate-prod:
    name: Validate Production (dry-run)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli --omit=dev
          sf plugins install @salesforce/plugin-deploy-retrieve
        env:
          SALESFORCE_CLI_TELEMETRY_DISABLED: true

      - name: Authenticate to Production
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_PROD }}" > ./auth-prod.txt
          sf org login sfdx-url --sfdx-url-file ./auth-prod.txt --alias prod-org --set-default
        env:
          SALESFORCE_CLI_TELEMETRY_DISABLED: true

      - name: Validate only (--dry-run)
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org prod-org \
            --test-level RunAllTests \
            --dry-run

      - name: Cleanup auth files
        if: always()
        run: |
          rm -f ./auth-prod.txt
          sf org logout --all --no-prompt 2>/dev/null || true

  # ── JOB 2: Real deploy (needs manual approval) ───────
  deploy-prod:
    name: Deploy to Production Org
    runs-on: ubuntu-latest
    needs: validate-prod          # only runs if Job 1 passes
    environment: production       # triggers the approval gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli --omit=dev
          sf plugins install @salesforce/plugin-deploy-retrieve
        env:
          SALESFORCE_CLI_TELEMETRY_DISABLED: true

      - name: Authenticate to Production
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_PROD }}" > ./auth-prod.txt
          sf org login sfdx-url --sfdx-url-file ./auth-prod.txt --alias prod-org --set-default
        env:
          SALESFORCE_CLI_TELEMETRY_DISABLED: true

      - name: Deploy to Production
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org prod-org \
            --test-level RunAllTests

      - name: Run all Apex tests
        run: |
          sf apex run test \
            --target-org prod-org \
            --code-coverage \
            --result-format human

      - name: Create release tag
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const tag = 'v' + new Date().toISOString().slice(0,10)
                      + '-' + context.sha.slice(0,7);
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   'refs/tags/' + tag,
              sha:   context.sha,
            });
            core.notice('Created release tag: ' + tag);

      - name: Write deployment summary
        if: always()
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Status    | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch    | main |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit    | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor     | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TestLevel | RunAllTests |" >> $GITHUB_STEP_SUMMARY
          echo "| Time      | $(date -u) |" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup auth files
        if: always()
        run: |
          rm -f ./auth-prod.txt
          sf org logout --all --no-prompt 2>/dev/null || true
