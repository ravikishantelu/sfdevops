name: Deploy to QA Sandbox

# -------------------------------------------------------
# Fires automatically when code is merged into the 'dev'
# integration branch. Authenticates with the QA sandbox
# using the SFDX_AUTH_URL_QA secret, validates first,
# then deploys and runs local Apex tests.
# -------------------------------------------------------
on:
  push:
    branches:
      - dev

jobs:
  deploy-qa:
    name: QA Sandbox Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli --omit=dev
          sf plugins install @salesforce/plugin-deploy-retrieve
        env:
          SALESFORCE_CLI_TELEMETRY_DISABLED: true

      - name: Authenticate to QA Sandbox
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_QA }}" > ./auth-qa.txt
          sf org login sfdx-url --sfdx-url-file ./auth-qa.txt --alias qa-org --set-default
        env:
          SALESFORCE_CLI_TELEMETRY_DISABLED: true

      - name: Validate deployment (dry-run)
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org qa-org \
            --test-level RunLocalTests \
            --dry-run
        continue-on-error: false

      - name: Deploy to QA Sandbox
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org qa-org \
            --test-level RunLocalTests

      - name: Run Apex tests
        run: |
          sf apex run test \
            --target-org qa-org \
            --code-coverage \
            --result-format human

      - name: Write deployment summary
        if: always()
        run: |
          echo "## QA Sandbox Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor  | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time   | $(date -u) |" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup auth files
        if: always()
        run: |
          rm -f ./auth-qa.txt
          sf org logout --all --no-prompt 2>/dev/null || true
